<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineAI - AI-Powered Movie Booking</title>
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js"></script>
    <style>
        df-messenger {
            --df-messenger-bot-message: #1e293b;
            --df-messenger-user-message: #ef4444;
            --df-messenger-font-color: white;
            --df-messenger-font-family: system-ui, -apple-system, sans-serif;
            --df-messenger-chat-background: #0f172a;
            --df-messenger-input-background: #1e293b;
            --df-messenger-input-color: white;
            --df-messenger-title-color: white;
            --df-messenger-icon-color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- Dialogflow Messenger -->
    <df-messenger
        intent="WELCOME"
        chat-title="CineAI Assistant"
        agent-id="YOUR_AGENT_ID"
        language-code="en"
        chat-icon="https://img.icons8.com/color/96/cinema.png"
    ></df-messenger>

    <!-- React App -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
